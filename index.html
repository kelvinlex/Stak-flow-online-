<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack</title>
    <script>
      // Prevent crash when libraries try to overwrite read-only window.fetch
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => originalFetch,
          set: (v) => { console.warn('Blocked attempt to overwrite window.fetch'); },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
